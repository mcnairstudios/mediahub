name: Test MediaHub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - name: Vet
        run: CGO_ENABLED=1 go vet ./pkg/...
      - name: Test
        run: |
          export GOMAXPROCS=16
          CGO_ENABLED=1 go test ./pkg/... -timeout 120s
      - name: Verify frontend
        run: node web/dist/smoke_test.js
      - name: Verify build
        run: CGO_ENABLED=1 go build ./cmd/mediahub/
