name: Build MediaHub Image

on:
  push:
    tags: ['v*']

env:
  IMAGE: gavinmcnair/mediahub

jobs:
  test-amd64:
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          export GOMAXPROCS=16
          CGO_ENABLED=1 go vet ./pkg/...
          CGO_ENABLED=1 go test ./pkg/... -timeout 120s
      - name: Verify frontend
        run: node web/dist/smoke_test.js
      - name: Verify build
        run: CGO_ENABLED=1 go build ./cmd/mediahub/

  test-arm64:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          export GOMAXPROCS=4
          CGO_ENABLED=1 go vet ./pkg/...
          CGO_ENABLED=1 go test ./pkg/... -timeout 120s
      - name: Verify frontend
        run: node web/dist/smoke_test.js
      - name: Verify build
        run: CGO_ENABLED=1 go build ./cmd/mediahub/

  build-amd64:
    needs: [test-amd64]
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_LOGIN}" --password-stdin
      - name: Build
        run: |
          TAG=${GITHUB_REF_NAME#v}
          docker build --build-arg VERSION=$TAG --build-arg GOMAXPROCS=16 \
            -t $IMAGE:$TAG-amd64 .
      - name: Push
        run: |
          TAG=${GITHUB_REF_NAME#v}
          docker push $IMAGE:$TAG-amd64

  build-arm64:
    needs: [test-arm64]
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_LOGIN}" --password-stdin
      - name: Build
        run: |
          TAG=${GITHUB_REF_NAME#v}
          docker build --build-arg VERSION=$TAG --build-arg GOMAXPROCS=4 \
            -t $IMAGE:$TAG-arm64 .
      - name: Push
        run: |
          TAG=${GITHUB_REF_NAME#v}
          docker push $IMAGE:$TAG-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Log in to Docker Hub
        run: echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_LOGIN}" --password-stdin
      - name: Create and push manifests
        run: |
          TAG=${GITHUB_REF_NAME#v}
          docker manifest create $IMAGE:$TAG \
            --amend $IMAGE:$TAG-amd64 \
            --amend $IMAGE:$TAG-arm64
          docker manifest push $IMAGE:$TAG
          docker manifest create $IMAGE:latest \
            --amend $IMAGE:$TAG-amd64 \
            --amend $IMAGE:$TAG-arm64
          docker manifest push $IMAGE:latest
